{% extends 'base.html' %}
{% load static %}

{% block content %}
  <link rel="stylesheet" href="{% static 'css/divida/cadastrar_divida.css' %}?v=1">
  <div class="container">
    <form action="{% url 'index_divida' %}" method="get" style="margin-bottom: 20px;">
        <button type="submit" class="btn-submit">Voltar</button>
    </form>
    
    <h1>Cadastrar Dívida</h1>

    <form method="post" action="{% url 'cadastrar_divida' %}">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Salvar</button>
    </form>

    {% if mensagem %}
      <p style="color:green; margin-top:15px;">{{ mensagem }}</p>
    {% endif %}
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <script>
      $(document).ready(function() {
          $('#id_cliente').select2({
              placeholder: " Digite o nome ou CPF do cliente...",
              allowClear: true,
              width: '100%'
          });
      });
  </script>
{% endblock %}
